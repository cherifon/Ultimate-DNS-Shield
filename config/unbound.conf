# =============================================================================

server:
    # -- Network binding --
    interface: 0.0.0.0
    port: 5335

    # -- Protocol support --
    do-ip4: yes
    do-ip6: yes
    do-udp: yes
    do-tcp: yes

    # -- Access control --
    # Deny all connections by default (security-first)
    access-control: 0.0.0.0/0 refuse
    # Allow localhost only (container-internal)
    access-control: 127.0.0.0/8 allow
    # Allow Pi-hole on the Docker bridge network only
    access-control: 172.20.0.0/24 allow

    # -- TCP performance --
    incoming-num-tcp: 100
    outgoing-num-tcp: 100
    tcp-idle-timeout: 30000

    # -- Packet safety --
    edns-buffer-size: 1232

    # -- Logging --
    # 0 = silent, 1 = basic info, 2+ = verbose debug
    verbosity: 1

    # -- Privacy --
    hide-identity: yes
    hide-version: yes

    # -- DNSSEC test domain exception --
    domain-insecure: "verteiltesysteme.net"
